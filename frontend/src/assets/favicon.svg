<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient Definition matching your Tailwind classes -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" /> <!-- blue-500 -->
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" /> <!-- purple-600 -->
    </linearGradient>
  </defs>
  
  <!-- The Box -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#grad)" />
  
  <!-- The Text -->
  <text x="50" y="65" font-family="system-ui, sans-serif" font-weight="800" font-size="45" fill="white" text-anchor="middle">
    EF
  </text>
</svg>